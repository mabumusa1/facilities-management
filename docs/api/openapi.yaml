        current_page:
          type: "integer"
          example: 1
        last_page:
          type: "integer"
          example: 10
        per_page:
          type: "integer"
          example: 10
        total:
          type: "integer"
          example: 100
    ErrorResponse:
      type: "object"
      properties:
        message:
          type: "string"
        errors:
          type: "object"
          additionalProperties:
            type: "array"
            items:
              type: "string"
    City:
      type: "object"
      properties:
        id:
          type: "integer"
        name:
          type: "string"
    District:
      type: "object"
      properties:
        id:
          type: "integer"
        name:
          type: "string"
    Country:
      type: "object"
      properties:
        id:
          type: "integer"
        name:
          type: "string"
        code:
          type: "string"
    Currency:
      type: "object"
      properties:
        id:
          type: "integer"
        name:
          type: "string"
        code:
          type: "string"
    Status:
      type: "object"
      properties:
        id:
          type: "integer"
        name:
          type: "string"
    Media:
      type: "object"
      properties:
        id:
          type: "integer"
        url:
          type: "string"
          format: "uri"
        name:
          type: "string"
        notes:
          type: "string"
  securitySchemes:
    bearerAuth:
      type: "http"
      scheme: "bearer"
      bearerFormat: "JWT"
      description: "JWT access token"
    tenantHeader:
      type: "apiKey"
      in: "header"
      name: "X-Tenant"
      description: "Tenant identifier"
security: - bearerAuth: []
    tenantHeader: []
