  /rf/admins/check-validate:
    post:
      tags:
        - Admins
      summary: Admin validation
      operationId: post_rf_admins_check_validate
      responses:
        401:
          description: Unauthorized
        403:
          description: Forbidden
        422:
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
              example:
                message: The given data was invalid.
                errors:
                  first_name:
                    - الحقل الاسم مطلوب.
                  last_name:
                    - الحقل اسم العائلة مطلوب.
                  phone_country_code:
                    - الحقل phone country code مطلوب.
                  phone_number:
                    - الحقل رقم الجوال مطلوب.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateRequest"
