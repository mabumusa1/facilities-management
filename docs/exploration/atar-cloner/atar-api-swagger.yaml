components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Token
    tenantHeader:
      type: apiKey
      in: header
      name: X-Tenant
  schemas:
    StandardResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: ""
        data:
          type: object
        meta:
          type: array
          items:
    ValidationError:
      type: object
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    Admin:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        image:
          type: string
          nullable: true
        phone_number:
          type: string
          example: "+966500000000"
        phone_country_code:
          type: string
          example: SA
        national_id:
          type: string
          nullable: true
        email:
          type: string
          format: email
        role:
          type: string
          example: Admins
        created_at:
          type: string
          format: date-time
        types:
          type: array
          items:
    ManagerRole:
      type: object
      properties:
        id:
          type: integer
        role:
          type: string
        name_ar:
          type: string
        name_en:
          type: string
        types:
          type: string
          nullable: true
    LeaseStatistics:
      type: object
      properties:
        totalLeases:
          type: integer
        newLeases:
          type: integer
        activeLeases:
          type: integer
        expiredLeases:
          type: integer
        terminatedLeases:
          type: integer
        percentNewLeases:
          type: integer
        percentActiveLeases:
          type: integer
    DashboardAttention:
      type: object
      properties:
        requests_approval:
          type: integer
        pending_complaints:
          type: integer
        expiring_leases:
          type: integer
        overdue_recipes:
          type: integer
    AdminCreateRequest:
      type: object
      required:
        - first_name
        - last_name
        - phone_country_code
        - phone_number
      properties:
        first_name:
          type: string
          description: First name (required)
        last_name:
          type: string
          description: Last name (required)
        phone_country_code:
          type: string
          description: Phone country code (required)
          example: SA
        phone_number:
          type: string
          description: Phone number (required)
        email:
          type: string
          format: email
        national_id:
          type: string
    LeaseMoveOutRequest:
      type: object
      required:
        - rf_lease_id
        - end_at
      properties:
        rf_lease_id:
          type: integer
          description: Lease ID (required)
        end_at:
          type: string
          format: date
          description: End date (required)
    LeaseTerminateRequest:
      type: object
      required:
        - rf_lease_id
        - end_at
      properties:
        rf_lease_id:
          type: integer
          description: Lease ID (required)
        end_at:
          type: string
          format: date
          description: End date (required)
    LeaseRenewRequest:
      type: object
      required:
        - rental_contract_type_id
        - created_at
        - start_date
        - end_date
        - rf_lease_id
        - number_of_years
        - number_of_months
        - autoGenerateLeaseNumber
        - contract_number
        - rental_type
        - payment_schedule_id
        - units
      properties:
        rf_lease_id:
          type: integer
          description: Existing lease ID
        rental_contract_type_id:
          type: integer
        created_at:
          type: string
          format: date
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        number_of_years:
          type: integer
          description: Lease duration in years
        number_of_months:
          type: integer
          description: Lease duration in months
        autoGenerateLeaseNumber:
          type: boolean
        contract_number:
          type: string
          description: Unique lease number
        rental_type:
          type: string
        payment_schedule_id:
          type: integer
        units:
          type: array
          items:
            type: integer
    RequestCancelRequest:
      type: object
      required:
        - rf_request_id
      properties:
        rf_request_id:
          type: integer
          description: Request ID to cancel
    BankSettingsRequest:
      type: object
      required:
        - beneficiary_name
        - bank_name
        - account_number
        - iban
      properties:
        beneficiary_name:
          type: string
        bank_name:
          type: string
        account_number:
          type: string
          description: Must be numeric, minimum 14 digits
        iban:
          type: string
    SalesSettingsRequest:
      type: object
      required:
        - deposit_time_limit_days
        - cash_contract_signing_days
        - bank_contract_signing_days
      properties:
        deposit_time_limit_days:
          type: integer
          description: Signing deadline in days
        cash_contract_signing_days:
          type: integer
        bank_contract_signing_days:
          type: integer
    VisitSettingsRequest:
      type: object
      required:
        - is_all_day
        - days
      properties:
        is_all_day:
          type: boolean
        days:
          type: array
          items:
            type: string
security:
  -
        bearerAuth: []
    tenantHeader: []
